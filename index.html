<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="header-tag">2026 NBA Draft</div>
        <h1>Draft <span>Predictor</span></h1>
        <p class="subtitle">Weighted aggregate of major mock drafts</p>
      </div>
      <div class="stats-bar" id="statsBar"></div>
    </header>
    <div id="weightsBar" class="weights-bar" style="display:none;"></div>
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading draft predictions…</p>
    </div>
    <div id="tableWrapper" class="table-wrapper" style="display:none;"></div>
    <div id="undraftedBoard" class="undrafted-board" style="display:none;">
      <div class="undrafted-header">
        <h2>Undrafted <span>Watchlist</span></h2>
        <p class="undrafted-subtitle">Best prospects left on the board after the simulation — potential sleepers and UDFA targets</p>
      </div>
      <div id="undraftedGrid" class="undrafted-grid"></div>
    </div>
    <div id="error" class="error" style="display:none;"></div>
    <footer>Aggregate rankings powered by <a href="https://hoopsmatic.com" target="_blank">HoopsMatic</a></footer>
  </div>
  <script>
    // DEPLOY-FP: 2026-05-11-v5-workout-boost-15pct
    const SOURCE_WEIGHTS = {
      'AGG RANK': 10, 'ESPN': 10, 'Athletic': 7, 'Bleacher': 6, 'Babcock': 6,
      'NBADraft': 3, 'CBS Sports': 3, 'No Ceilings': 2, 'The Ringer': 2,
      'USAT': 4, 'Yahoo!': 2, 'SB Nation': 1
    };
    const SKIP_SOURCES = ['SI.com'];
    const CSV_URL = '/api/draft-csv';

    function parseCSV(text) {
      const rows = []; let current = '', inQuotes = false, row = [];
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
          else if (ch === '"') inQuotes = false;
          else current += ch;
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ',') { row.push(current.trim()); current = ''; }
          else if (ch === '\n' || ch === '\r') {
            if (ch === '\r' && text[i+1] === '\n') i++;
            row.push(current.trim());
            if (row.length > 1 || row[0] !== '') rows.push(row);
            row = []; current = '';
          } else current += ch;
        }
      }
      if (current || row.length > 0) { row.push(current.trim()); if (row.length > 1 || row[0] !== '') rows.push(row); }
      return rows;
    }

    function computeAggregate(csvText) {
      const rows = parseCSV(csvText);
      if (rows.length < 2) return { players: [], sources: [] };
      const header = rows[0];
      const sourceColumns = {};
      const activeSources = [];
      for (const [sourceName, weight] of Object.entries(SOURCE_WEIGHTS)) {
        const idx = header.findIndex(h => h.trim() === sourceName);
        if (idx >= 0) {
          sourceColumns[sourceName] = idx;
          activeSources.push({ name: sourceName, weight, colIdx: idx });
        }
      }
      const statCols = {
        PPG: header.findIndex(h => h.trim() === 'PPG'),
        RPG: header.findIndex(h => h.trim() === 'RPG'),
        APG: header.findIndex(h => h.trim() === 'APG'),
      };
      const playerHeaders = [];
      header.forEach((h, idx) => { if ((h || '').trim() === 'PLAYER') playerHeaders.push(idx); });
      const bioNameIdx = playerHeaders.length ? playerHeaders[playerHeaders.length - 1] : -1;
      const dcIdx = header.findIndex(h => h.trim() === 'DRAFT COMBINE');
      const glIdx = header.findIndex(h => h.trim() === 'GL COMBINE');
      const combineByName = {};
      if (bioNameIdx >= 0 && (dcIdx >= 0 || glIdx >= 0)) {
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const bn = (r[bioNameIdx] || '').trim();
          if (!bn) continue;
          const dc = dcIdx >= 0 && (r[dcIdx] || '').trim().toUpperCase() === 'YES';
          const gl = glIdx >= 0 && (r[glIdx] || '').trim().toUpperCase() === 'YES';
          if (dc || gl) combineByName[bn] = { dc, gl };
        }
      }
      const posIdx = header.findIndex(h => h.trim() === 'POSITION');
      const schoolIdx = header.findIndex((h, i) => h.trim() === 'TEAM' && i > bioNameIdx);
      const countryIdx = header.findIndex(h => h.trim() === 'COUNTRY');
      const ageDaysIdx = header.findIndex(h => h.trim() === 'AGE DAYS');
      const bioByName = {};
      if (bioNameIdx >= 0) {
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const bn = (r[bioNameIdx] || '').trim();
          if (!bn) continue;
          const bio = {};
          if (posIdx >= 0) bio.position = (r[posIdx] || '').trim();
          if (schoolIdx >= 0) bio.school = (r[schoolIdx] || '').trim();
          if (countryIdx >= 0) bio.country = (r[countryIdx] || '').trim();
          if (ageDaysIdx >= 0) {
            const days = parseInt((r[ageDaysIdx] || '').trim(), 10);
            if (!isNaN(days) && days > 0) bio.ageYears = Math.floor(days / 365.25);
          }
          if (bio.position || bio.school || bio.country || bio.ageYears) {
            bioByName[bn] = bio;
          }
        }
      }
      const TEAM_NAME_TO_ABBR = {
        'ATL':'ATL','ATLANTA':'ATL','ATLANTA HAWKS':'ATL','HAWKS':'ATL',
        'BOS':'BOS','BOSTON':'BOS','BOSTON CELTICS':'BOS','CELTICS':'BOS',
        'BKN':'BKN','BROOKLYN':'BKN','BROOKLYN NETS':'BKN','NETS':'BKN',
        'CHA':'CHA','CHARLOTTE':'CHA','CHARLOTTE HORNETS':'CHA','HORNETS':'CHA',
        'CHI':'CHI','CHICAGO':'CHI','CHICAGO BULLS':'CHI','BULLS':'CHI',
        'CLE':'CLE','CLEVELAND':'CLE','CLEVELAND CAVALIERS':'CLE','CAVALIERS':'CLE','CAVS':'CLE',
        'DAL':'DAL','DALLAS':'DAL','DALLAS MAVERICKS':'DAL','MAVERICKS':'DAL','MAVS':'DAL',
        'DEN':'DEN','DENVER':'DEN','DENVER NUGGETS':'DEN','NUGGETS':'DEN',
        'DET':'DET','DETROIT':'DET','DETROIT PISTONS':'DET','PISTONS':'DET',
        'GSW':'GSW','GOLDEN STATE':'GSW','GOLDEN STATE WARRIORS':'GSW','WARRIORS':'GSW',
        'HOU':'HOU','HOUSTON':'HOU','HOUSTON ROCKETS':'HOU','ROCKETS':'HOU',
        'IND':'IND','INDIANA':'IND','INDIANA PACERS':'IND','PACERS':'IND',
        'LAC':'LAC','LA CLIPPERS':'LAC','LOS ANGELES CLIPPERS':'LAC','CLIPPERS':'LAC',
        'LAL':'LAL','LA LAKERS':'LAL','LOS ANGELES LAKERS':'LAL','LAKERS':'LAL',
        'MEM':'MEM','MEMPHIS':'MEM','MEMPHIS GRIZZLIES':'MEM','GRIZZLIES':'MEM',
        'MIA':'MIA','MIAMI':'MIA','MIAMI HEAT':'MIA','HEAT':'MIA',
