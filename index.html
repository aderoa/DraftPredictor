<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Draft Predictor — Aggregated Mock Draft</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #111827;
      --bg-row-alt: #0d1322;
      --bg-hover: #1a2340;
      --border: #1e293b;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-gold: #f59e0b;
      --accent-green: #10b981;
      --accent-blue: #3b82f6;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;
      --top5: #f59e0b;
      --top10: #3b82f6;
      --top20: #10b981;
      --lottery: #8b5cf6;
      --first-round: #94a3b8;
      --second-round: #64748b;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    /* Subtle grid pattern background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }
    
    /* Header */
    header {
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }
    
    .header-left { flex: 1; }
    
    .header-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-gold);
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }
    
    h1 {
      font-size: 2.75rem;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      color: white;
    }
    
    h1 span {
      color: var(--accent-gold);
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
      margin-top: 0.5rem;
    }
    
    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    
    .stat-item {
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      min-width: 100px;
    }
    
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-blue);
    }
    
    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }
    
    /* Weights legend */
    .weights-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    
    .weights-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.5rem;
    }
    
    .weight-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--text-secondary);
    }
    
    .weight-chip .w {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--accent-blue);
      font-size: 0.7rem;
    }
    
    /* Table */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    
    thead th {
      position: sticky;
      top: 0;
      background: #0f172a;
      border-bottom: 2px solid var(--accent-gold);
      padding: 0.75rem 0.6rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      z-index: 10;
    }
    
    thead th:hover { color: var(--accent-gold); }
    
    thead th.sorted-asc::after { content: ' ▲'; color: var(--accent-gold); }
    thead th.sorted-desc::after { content: ' ▼'; color: var(--accent-gold); }
    
    th.col-rank { width: 50px; }
    th.col-player { text-align: left; min-width: 180px; }
    th.col-score { width: 80px; }
    th.col-sources { width: 50px; }
    
    tbody tr {
      border-bottom: 1px solid rgba(30, 41, 59, 0.5);
      transition: background 0.1s;
    }
    
    tbody tr:nth-child(even) { background: var(--bg-row-alt); }
    tbody tr:hover { background: var(--bg-hover); }
    
    /* Tier separator rows */
    tbody tr.tier-5 td:first-child { border-left: 3px solid var(--top5); }
    tbody tr.tier-10 td:first-child { border-left: 3px solid var(--top10); }
    tbody tr.tier-20 td:first-child { border-left: 3px solid var(--top20); }
    tbody tr.tier-lottery td:first-child { border-left: 3px solid var(--lottery); }
    tbody tr.tier-first td:first-child { border-left: 3px solid var(--first-round); }
    tbody tr.tier-second td:first-child { border-left: 3px solid var(--second-round); }
    
    td {
      padding: 0.6rem;
      text-align: center;
      vertical-align: middle;
    }
    
    /* Rank column */
    .rank-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 1rem;
    }
    
    .rank-cell.top5 { color: var(--top5); }
    .rank-cell.top10 { color: var(--top10); }
    .rank-cell.top20 { color: var(--top20); }
    .rank-cell.lottery { color: var(--lottery); }
    .rank-cell.first-round { color: var(--first-round); }
    .rank-cell.second-round { color: var(--second-round); }
    
    /* Player name */
    .player-cell {
      text-align: left;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
    }
    
    /* Score */
    .score-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.9rem;
    }
    
    .score-cell.elite { color: var(--accent-gold); }
    .score-cell.high { color: var(--accent-green); }
    .score-cell.mid { color: var(--accent-blue); }
    .score-cell.low { color: var(--text-muted); }
    
    /* Source count */
    .sources-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }
    
    .sources-cell .count {
      font-weight: 700;
      color: var(--accent-green);
    }
    
    .sources-cell .total {
      color: var(--text-muted);
    }
    
    /* Mock draft rank cells */
    .mock-rank {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 0.8rem;
    }
    
    .mock-rank.top5-pick { color: var(--top5); font-weight: 700; }
    .mock-rank.top10-pick { color: var(--top10); font-weight: 600; }
    .mock-rank.top20-pick { color: var(--accent-green); }
    .mock-rank.lottery-pick { color: var(--accent-purple); }
    .mock-rank.first-pick { color: var(--text-secondary); }
    .mock-rank.second-pick { color: var(--text-muted); }
    .mock-rank.unranked { color: rgba(100, 116, 139, 0.3); }
    
    /* Consensus bar */
    .consensus-cell {
      padding: 0.6rem 0.4rem;
    }
    
    .consensus-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .consensus-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .consensus-bar-fill.tight { background: var(--accent-green); }
    .consensus-bar-fill.moderate { background: var(--accent-blue); }
    .consensus-bar-fill.wide { background: var(--accent-gold); }
    .consensus-bar-fill.split { background: var(--accent-red); }
    
    /* Score bar */
    .score-bar-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .score-bar-bg {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold));
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 6rem 2rem;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading-text {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    
    .error {
      text-align: center;
      padding: 3rem;
      color: var(--accent-red);
      font-family: 'JetBrains Mono', monospace;
    }
    
    /* Footer */
    footer {
      text-align: center;
      margin-top: 2.5rem;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
    
    footer a {
      color: var(--accent-gold);
      text-decoration: none;
    }
    
    footer a:hover { text-decoration: underline; }
    
    /* ===== UNDRAFTED WATCHLIST ===== */
    .undrafted-board {
      margin-top: 3rem;
    }
    
    .undrafted-header {
      margin-bottom: 1.5rem;
    }
    
    .undrafted-header h2 {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
    }
    
    .undrafted-header h2 span {
      color: var(--accent-red);
    }
    
    .undrafted-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
    
    .undrafted-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.75rem;
    }
    
    .undrafted-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      transition: border-color 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .undrafted-card:hover {
      border-color: rgba(239, 68, 68, 0.3);
      transform: translateY(-2px);
    }
    
    .undrafted-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    
    .undrafted-rank {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      font-size: 0.8rem;
      color: var(--accent-red);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    
    .undrafted-name {
      font-weight: 700;
      font-size: 1rem;
      color: white;
      flex: 1;
    }
    
    .undrafted-score {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent-blue);
    }
    
    .undrafted-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    
    .undrafted-source-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    
    .undrafted-source-chip .src-rank {
      font-weight: 700;
      color: var(--accent-gold);
    }
    
    .undrafted-bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .undrafted-bar-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      min-width: 50px;
    }
    
    .undrafted-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .undrafted-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    }
    
    /* Stagger animation */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    tbody tr {
      animation: fadeSlideIn 0.3s ease both;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 1.75rem; }
      header { flex-direction: column; align-items: flex-start; }
      .stats-bar { width: 100%; }
      .stat-item { flex: 1; min-width: 70px; padding: 0.5rem 0.75rem; }
      .stat-value { font-size: 1.1rem; }
      table { font-size: 0.75rem; }
      td, th { padding: 0.4rem 0.35rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="header-tag">2025 NBA Draft</div>
        <h1>Draft <span>Predictor</span></h1>
        <p class="subtitle">Weighted aggregate of major mock drafts</p>
      </div>
      <div class="stats-bar" id="statsBar"></div>
    </header>
    
    <div id="weightsBar" class="weights-bar" style="display:none;"></div>
    
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading draft predictions…</p>
    </div>
    
    <div id="tableWrapper" class="table-wrapper" style="display:none;"></div>
    
    <div id="undraftedBoard" class="undrafted-board" style="display:none;">
      <div class="undrafted-header">
        <h2>Undrafted <span>Watchlist</span></h2>
        <p class="undrafted-subtitle">Best prospects left on the board after the simulation — potential sleepers and UDFA targets</p>
      </div>
      <div id="undraftedGrid" class="undrafted-grid"></div>
    </div>
    
    <div id="error" class="error" style="display:none;"></div>
    
    <footer>
      Aggregate rankings powered by <a href="https://hoopsmatic.com" target="_blank">HoopsMatic</a>
    </footer>
  </div>
  
  <script>
    // =====================================================
    // CONFIG: Source weights (order = display order)
    // =====================================================
    const SOURCE_WEIGHTS = {
      'AGG RANK': 10,
      'ESPN': 10,
      'Athletic': 7,
      'Bleacher': 6,
      'Babcock': 6,
      'NBADraft': 3,
      'CBS Sports': 3,
      'No Ceilings': 2,
      'The Ringer': 2,
      'USAT': 4,
      'Yahoo!': 2,
      'SB Nation': 1
    };
    
    const SKIP_SOURCES = ['SI.com'];
    
    // =====================================================
    // DATA URL — Update with your sheet's published CSV
    // =====================================================
    const SHEET_ID = '2PACX-1vSg6im6IYB6HXMGzQbmmBnLw9SfQLzxCSo8OfChxlJLhsB6BBCO0wPF_TMch0YgAbtFqYkwDWrsxRe7';
    const DRAFT_GID = '965849547';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${DRAFT_GID}&single=true&output=csv`;
    
    // =====================================================
    // CSV PARSER
    // =====================================================
    function parseCSV(text) {
      const rows = []; let current = '', inQuotes = false, row = [];
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
          else if (ch === '"') inQuotes = false;
          else current += ch;
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ',') { row.push(current.trim()); current = ''; }
          else if (ch === '\n' || ch === '\r') {
            if (ch === '\r' && text[i+1] === '\n') i++;
            row.push(current.trim());
            if (row.length > 1 || row[0] !== '') rows.push(row);
            row = []; current = '';
          } else current += ch;
        }
      }
      if (current || row.length > 0) { row.push(current.trim()); if (row.length > 1 || row[0] !== '') rows.push(row); }
      return rows;
    }
    
    // =====================================================
    // AGGREGATE COMPUTATION
    // =====================================================
    function computeAggregate(csvText) {
      const rows = parseCSV(csvText);
      if (rows.length < 2) return { players: [], sources: [] };
      
      const header = rows[0];
      
      // Find column indices for each source
      const sourceColumns = {};
      const activeSources = [];
      
      for (const [sourceName, weight] of Object.entries(SOURCE_WEIGHTS)) {
        const idx = header.findIndex(h => h.trim() === sourceName);
        if (idx >= 0) {
          sourceColumns[sourceName] = idx;
          activeSources.push({ name: sourceName, weight, colIdx: idx });
        }
      }

      // Find stats columns (PPG/RPG/APG) — these are manually populated in the
      // sheet from the post-season NCAA extract. Looked up by header name so
      // column order changes don't break the integration.
      const statCols = {
        PPG: header.findIndex(h => h.trim() === 'PPG'),
        RPG: header.findIndex(h => h.trim() === 'RPG'),
        APG: header.findIndex(h => h.trim() === 'APG'),
      };
      
      // Player name column (first column)
      const nameIdx = 0;
      
      // Pick-to-team mapping (column P=15 is pick position, column Q=16 is team)
      const pickTeamMap = {}; // pick number -> team abbreviation
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const pickNum = parseInt(row[15]);
        const team = row[16]?.trim();
        if (pickNum && team) {
          pickTeamMap[pickNum] = team;
        }
      }
      
      // Parse all player data
      const rawPlayers = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = row[nameIdx]?.trim();
        if (!name) continue;
        
        const ranks = {};
        let hasAnyRank = false;
        
        for (const src of activeSources) {
          const val = row[src.colIdx]?.trim();
          if (val && !isNaN(parseInt(val))) {
            ranks[src.name] = parseInt(val);
            hasAnyRank = true;
          }
        }
        
        if (hasAnyRank) {
          // Pull PPG/RPG/APG if columns are present; empty/missing → undefined
          const readStat = (idx) => {
            if (idx < 0) return undefined;
            const v = row[idx]?.trim();
            if (v === '' || v === undefined || isNaN(parseFloat(v))) return undefined;
            return parseFloat(v);
          };
          rawPlayers.push({
            name,
            ranks,
            ppg: readStat(statCols.PPG),
            rpg: readStat(statCols.RPG),
            apg: readStat(statCols.APG),
          });
        }
      }
      
      // For each source, determine N (how many players are ranked)
      const sourceMaxRanked = {};
      for (const src of activeSources) {
        let maxRank = 0;
        for (const p of rawPlayers) {
          if (p.ranks[src.name] && p.ranks[src.name] > maxRank) {
            maxRank = p.ranks[src.name];
          }
        }
        sourceMaxRanked[src.name] = maxRank;
      }
      
      // Compute weighted score for each player
      const players = rawPlayers.map(p => {
        let weightedSum = 0;
        let totalWeight = 0;
        let sourcesRanked = 0;
        const ranksArray = [];
        
        const totalWeightAll = activeSources.reduce((sum, s) => sum + s.weight, 0);
        
        for (const src of activeSources) {
          const rank = p.ranks[src.name];
          if (rank) {
            const N = sourceMaxRanked[src.name];
            const points = N - rank + 1;
            weightedSum += points * src.weight;
            sourcesRanked++;
            ranksArray.push(rank);
          }
        }
        
        const score = totalWeightAll > 0 ? weightedSum / totalWeightAll : 0;
        
        // Consensus: standard deviation of ranks (lower = more consensus)
        let consensus = 0;
        if (ranksArray.length > 1) {
          const mean = ranksArray.reduce((a, b) => a + b, 0) / ranksArray.length;
          const variance = ranksArray.reduce((sum, r) => sum + Math.pow(r - mean, 2), 0) / ranksArray.length;
          consensus = Math.sqrt(variance);
        }
        
        return {
          name: p.name,
          score: Math.round(score * 100) / 100,
          sourcesRanked,
          totalSources: activeSources.length,
          ranks: p.ranks,
          consensus: Math.round(consensus * 10) / 10,
          bestRank: Math.min(...ranksArray),
          worstRank: Math.max(...ranksArray),
          ppg: p.ppg,
          rpg: p.rpg,
          apg: p.apg
        };
      });
      
      // Sort by score descending
      players.sort((a, b) => b.score - a.score);
      
      // =====================================================
      // CASCADING DRAFT SIMULATION
      // Each source votes for their top remaining player,
      // winner is removed, repeat for next pick.
      // =====================================================
      const totalSourceWeight = activeSources.reduce((s, src) => s + src.weight, 0);
      const maxPicks = 60;
      const drafted = [];
      const available = new Set(players.map(p => p.name));
      
      // Build each source's ordered list
      const sourceLists = {};
      for (const src of activeSources) {
        const list = [];
        for (const p of players) {
          if (p.ranks[src.name]) {
            list.push({ name: p.name, rank: p.ranks[src.name] });
          }
        }
        list.sort((a, b) => a.rank - b.rank);
        sourceLists[src.name] = list;
      }
      
      for (let pick = 1; pick <= maxPicks; pick++) {
        if (available.size === 0) break;
        
        // Each source votes for their top remaining player
        const votes = {};
        for (const src of activeSources) {
          const topPick = sourceLists[src.name].find(e => available.has(e.name));
          if (topPick) {
            if (!votes[topPick.name]) votes[topPick.name] = 0;
            votes[topPick.name] += src.weight;
          }
        }
        
        // Sort candidates by votes
        const candidates = Object.entries(votes)
          .map(([name, weight]) => ({ name, pct: Math.round((weight / totalSourceWeight) * 100) }))
          .sort((a, b) => b.pct - a.pct);
        
        if (candidates.length === 0) break;
        
        const winner = candidates[0];
        const player = players.find(p => p.name === winner.name);
        
        player.finalRank = pick;
        player.simPct = winner.pct;
        player.simPick = pick;
        drafted.push(player);
        available.delete(winner.name);
      }
      
      // Add undrafted players after pick 60
      let undraftedRank = maxPicks + 1;
      players.filter(p => available.has(p.name)).forEach(p => {
        p.finalRank = undraftedRank++;
        p.simPct = 0;
        p.simPick = null;
        drafted.push(p);
      });
      
      return { players: drafted, sources: activeSources, sourceMaxRanked, pickTeamMap, availableSet: available };
    }
    
    // =====================================================
    // RENDERING
    // =====================================================
    function getRankTier(rank) {
      if (rank <= 5) return 'top5';
      if (rank <= 10) return 'top10';
      if (rank <= 14) return 'lottery';
      if (rank <= 20) return 'top20';
      if (rank <= 30) return 'first-round';
      return 'second-round';
    }
    
    function getTierRowClass(rank) {
      if (rank <= 5) return 'tier-5';
      if (rank <= 10) return 'tier-10';
      if (rank <= 14) return 'tier-lottery';
      if (rank <= 20) return 'tier-20';
      if (rank <= 30) return 'tier-first';
      return 'tier-second';
    }
    
    function getMockRankClass(rank) {
      if (!rank) return 'unranked';
      if (rank <= 5) return 'top5-pick';
      if (rank <= 10) return 'top10-pick';
      if (rank <= 14) return 'lottery-pick';
      if (rank <= 20) return 'top20-pick';
      if (rank <= 30) return 'first-pick';
      return 'second-pick';
    }
    
    function getScoreClass(score, maxScore) {
      const pct = score / maxScore;
      if (pct >= 0.85) return 'elite';
      if (pct >= 0.6) return 'high';
      if (pct >= 0.3) return 'mid';
      return 'low';
    }
    
    function getConsensusClass(consensus) {
      if (consensus <= 3) return 'tight';
      if (consensus <= 8) return 'moderate';
      if (consensus <= 15) return 'wide';
      return 'split';
    }
    
    function render(data) {
      const { players, sources, sourceMaxRanked, pickTeamMap, availableSet } = data;
      if (players.length === 0) {
        document.getElementById('error').textContent = 'No draft data available yet — check back closer to draft night.';
        document.getElementById('error').style.display = 'block';
        return;
      }
      
      const maxScore = players[0].score;
      const totalWeight = Object.values(SOURCE_WEIGHTS).reduce((a, b) => a + b, 0);
      
      // Stats bar
      document.getElementById('statsBar').innerHTML = `
        <div class="stat-item">
          <div class="stat-value">${players.length}</div>
          <div class="stat-label">Prospects</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${sources.length}</div>
          <div class="stat-label">Sources</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${totalWeight}</div>
          <div class="stat-label">Total Weight</div>
        </div>
      `;
      
      // Weights bar
      const weightsBar = document.getElementById('weightsBar');
      weightsBar.innerHTML = `
        <span class="weights-label">Weights:</span>
        ${sources.map(s => `
          <span class="weight-chip">
            ${s.name} <span class="w">×${s.weight}</span>
          </span>
        `).join('')}
      `;
      weightsBar.style.display = 'flex';
      
      // Table
      let html = '<table><thead><tr>';
      html += '<th class="col-rank" data-col="finalRank" data-type="num" title="Final predicted draft position based on the weighted aggregation of all sources">Rank</th>';
      html += '<th data-col="team" data-type="str" style="width:55px">Team</th>';
      html += '<th class="col-player" data-col="name" data-type="str">Player</th>';
      html += '<th class="col-score" data-col="score" data-type="num" title="Aggregated weighted score across all mock draft sources — lower is better (closer to #1)">Score</th>';
      html += '<th class="col-sources" data-col="sourcesRanked" data-type="num" title="Number of mock draft sources that included this player in their rankings">Srcs</th>';
      html += '<th data-col="consensus" data-type="num" title="Spread between the highest and lowest mock-draft placement for this player (smaller = more agreement across sources)">Spread</th>';
      html += '<th data-col="simPct" data-type="num" title="Simulated probability the player is drafted at this exact slot">Prob</th>';
      html += '<th data-col="ppg" data-type="num" title="Points per game in 2025-26 college season (empty = international/no NCAA data)">PPG</th>';
      html += '<th data-col="rpg" data-type="num" title="Rebounds per game in 2025-26 college season (empty = international/no NCAA data)">RPG</th>';
      html += '<th data-col="apg" data-type="num" title="Assists per game in 2025-26 college season (empty = international/no NCAA data)">APG</th>';
      
      for (const src of sources) {
        const shortName = src.name.replace('AGG RANK', 'AGG')
                                   .replace('CBS Sports', 'CBS')
                                   .replace('No Ceilings', 'NoCeil')
                                   .replace('SB Nation', 'SBN')
                                   .replace('Bleacher', 'BR')
                                   .replace('Babcock', 'Bab')
                                   .replace('Athletic', 'Ath');
        const fullLabel = src.name.replace(/"/g, '&quot;');
        html += `<th data-col="mock_${src.name}" data-type="num" title="${fullLabel} — weight ×${src.weight}">${shortName}<br><span style="font-size:0.6rem;color:var(--text-muted)">×${src.weight}</span></th>`;
      }
      
      html += '</tr></thead><tbody>';
      
      players.forEach((p, i) => {
        const tier = getRankTier(p.finalRank);
        const tierRow = getTierRowClass(p.finalRank);
        const scoreClass = getScoreClass(p.score, maxScore);
        const scorePct = (p.score / maxScore) * 100;
        const consensusClass = getConsensusClass(p.consensus);
        const maxConsensus = 30;
        const consensusPct = Math.min(100, ((maxConsensus - p.consensus) / maxConsensus) * 100);
        
        html += `<tr class="${tierRow}" style="animation-delay: ${Math.min(i * 0.02, 1)}s">`;
        html += `<td class="rank-cell ${tier}">${p.finalRank}</td>`;
        const teamForPick = pickTeamMap[p.finalRank] || '';
        html += `<td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:600;color:var(--text-secondary)">${teamForPick}</td>`;
        html += `<td class="player-cell">${p.name}</td>`;
        html += `<td>
          <div class="score-bar-container">
            <span class="score-cell ${scoreClass}">${p.score.toFixed(1)}</span>
          </div>
        </td>`;
        html += `<td class="sources-cell"><span class="count">${p.sourcesRanked}</span><span class="total">/${p.totalSources}</span></td>`;
        html += `<td class="consensus-cell">
          <div class="consensus-bar-bg">
            <div class="consensus-bar-fill ${consensusClass}" style="width: ${consensusPct}%"></div>
          </div>
        </td>`;
        const pctColor = p.simPct >= 80 ? 'var(--accent-gold)' : p.simPct >= 50 ? 'var(--accent-green)' : p.simPct >= 30 ? 'var(--accent-blue)' : p.simPct > 0 ? 'var(--accent-purple)' : 'var(--text-muted)';
        html += `<td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;color:${pctColor}">${p.simPct > 0 ? p.simPct + '%' : '—'}</td>`;
        // Per-game stats — mono font, muted "—" for prospects without NCAA data
        const statCell = (v) => {
          if (v === undefined || v === null || isNaN(v)) {
            return `<td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted)">—</td>`;
          }
          return `<td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:600">${v.toFixed(1)}</td>`;
        };
        html += statCell(p.ppg);
        html += statCell(p.rpg);
        html += statCell(p.apg);
        
        for (const src of sources) {
          const rank = p.ranks[src.name];
          const cls = getMockRankClass(rank);
          html += `<td class="mock-rank ${cls}">${rank || '—'}</td>`;
        }
        
        html += '</tr>';
      });
      
      html += '</tbody></table>';
      
      const wrapper = document.getElementById('tableWrapper');
      wrapper.innerHTML = html;
      wrapper.style.display = 'block';
      
      // Sortable columns
      setupSorting(players, sources, maxScore, pickTeamMap);
      
      // Undrafted watchlist
      renderUndrafted(players, sources, sourceMaxRanked, availableSet);
    }
    
    // =====================================================
    // UNDRAFTED WATCHLIST
    // =====================================================
    function renderUndrafted(players, sources, sourceMaxRanked, availableSet) {
      const undrafted = players
        .filter(p => availableSet.has(p.name))
        .sort((a, b) => b.score - a.score);
      
      if (undrafted.length === 0) return;
      
      const maxScore = undrafted[0].score;
      const grid = document.getElementById('undraftedGrid');
      let html = '';
      
      // Source short names for chips
      const shortNames = {
        'AGG RANK': 'AGG', 'ESPN': 'ESPN', 'Athletic': 'ATH', 'Bleacher': 'BR',
        'Babcock': 'BAB', 'NBADraft': 'NBAD', 'CBS Sports': 'CBS',
        'No Ceilings': 'NC', 'USAT': 'USAT', 'SB Nation': 'SBN'
      };
      
      undrafted.forEach((p, i) => {
        const scorePct = maxScore > 0 ? (p.score / maxScore) * 100 : 0;
        
        html += `<div class="undrafted-card">`;
        html += `<div class="undrafted-card-top">`;
        html += `<span class="undrafted-rank">#${i + 1} UDFA</span>`;
        html += `<span class="undrafted-name">${p.name}</span>`;
        html += `<span class="undrafted-score">${p.score.toFixed(1)}</span>`;
        html += `</div>`;
        
        // Source chips
        html += `<div class="undrafted-sources">`;
        for (const src of sources) {
          if (p.ranks[src.name]) {
            const sn = shortNames[src.name] || src.name;
            html += `<span class="undrafted-source-chip">${sn} <span class="src-rank">#${p.ranks[src.name]}</span></span>`;
          }
        }
        html += `</div>`;
        
        // Score bar
        html += `<div class="undrafted-bar-row">`;
        html += `<span class="undrafted-bar-label">Score</span>`;
        html += `<div class="undrafted-bar-bg"><div class="undrafted-bar-fill" style="width: ${scorePct}%"></div></div>`;
        html += `</div>`;
        
        html += `</div>`;
      });
      
      grid.innerHTML = html;
      document.getElementById('undraftedBoard').style.display = 'block';
    }
    
    // =====================================================
    // SORTABLE TABLE
    // =====================================================
    let currentSort = { col: 'finalRank', dir: 'asc' };
    
    function setupSorting(players, sources, maxScore, pickTeamMap) {
      document.querySelectorAll('thead th').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          const type = th.dataset.type;
          if (!col) return;
          
          if (currentSort.col === col) {
            currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
          } else {
            currentSort.col = col;
            currentSort.dir = type === 'num' ? 'asc' : 'asc';
            // For score, default descending (higher = better)
            if (col === 'score') currentSort.dir = 'desc';
            // For sourcesRanked, default descending
            if (col === 'sourcesRanked') currentSort.dir = 'desc';
          }
          
          // Clear sort indicators
          document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
          th.classList.add(currentSort.dir === 'asc' ? 'sorted-asc' : 'sorted-desc');
          
          const sorted = [...players];
          sorted.sort((a, b) => {
            let va, vb;
            
            if (col.startsWith('mock_')) {
              const srcName = col.replace('mock_', '');
              va = a.ranks[srcName] || 999;
              vb = b.ranks[srcName] || 999;
            } else if (col === 'name') {
              va = a.name;
              vb = b.name;
            } else {
              va = a[col];
              vb = b[col];
            }
            
            let cmp;
            if (typeof va === 'string') {
              cmp = va.localeCompare(vb);
            } else {
              // Missing numeric values (e.g. international prospects without NCAA stats)
              // always sink to the bottom, regardless of sort direction.
              const aBad = va === undefined || va === null || Number.isNaN(va);
              const bBad = vb === undefined || vb === null || Number.isNaN(vb);
              if (aBad && bBad) cmp = 0;
              else if (aBad) return 1;   // a sinks
              else if (bBad) return -1;  // b sinks
              else cmp = va - vb;
            }
            
            return currentSort.dir === 'desc' ? -cmp : cmp;
          });
          
          // Re-render tbody only
          const tbody = document.querySelector('tbody');
          let html = '';
          
          sorted.forEach((p, i) => {
            const tier = getRankTier(p.finalRank);
            const tierRow = getTierRowClass(p.finalRank);
            const scoreClass = getScoreClass(p.score, maxScore);
            const consensusClass = getConsensusClass(p.consensus);
            const maxConsensus = 30;
            const consensusPct = Math.min(100, ((maxConsensus - p.consensus) / maxConsensus) * 100);
            
            html += `<tr class="${tierRow}">`;
            html += `<td class="rank-cell ${tier}">${p.finalRank}</td>`;
            const teamForPick = pickTeamMap[p.finalRank] || '';
            html += `<td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:600;color:var(--text-secondary)">${teamForPick}</td>`;
            html += `<td class="player-cell">${p.name}</td>`;
            html += `<td>
              <div class="score-bar-container">
                <span class="score-cell ${scoreClass}">${p.score.toFixed(1)}</span>
              </div>
            </td>`;
            html += `<td class="sources-cell"><span class="count">${p.sourcesRanked}</span><span class="total">/${p.totalSources}</span></td>`;
            html += `<td class="consensus-cell">
              <div class="consensus-bar-bg">
                <div class="consensus-bar-fill ${consensusClass}" style="width: ${consensusPct}%"></div>
              </div>
            </td>`;
            const pctColor2 = p.simPct >= 80 ? 'var(--accent-gold)' : p.simPct >= 50 ? 'var(--accent-green)' : p.simPct >= 30 ? 'var(--accent-blue)' : p.simPct > 0 ? 'var(--accent-purple)' : 'var(--text-muted)';
            html += `<td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;color:${pctColor2}">${p.simPct > 0 ? p.simPct + '%' : '—'}</td>`;
            
            for (const src of sources) {
              const rank = p.ranks[src.name];
              const cls = getMockRankClass(rank);
              html += `<td class="mock-rank ${cls}">${rank || '—'}</td>`;
            }
            
            html += '</tr>';
          });
          
          tbody.innerHTML = html;
        });
      });
    }
    
    // =====================================================
    // INIT
    // =====================================================
    async function init() {
      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error('Failed to fetch data');
        const text = await response.text();
        
        const data = computeAggregate(text);
        
        document.getElementById('loading').style.display = 'none';
        render(data);
        
      } catch (err) {
        console.error('[Draft]', err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = "Couldn't load draft predictions. Try refreshing — if this keeps happening, the data might be updating right now.";
        document.getElementById('error').style.display = 'block';
      }
    }
    
    init();
  </script>
